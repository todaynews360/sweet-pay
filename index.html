<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweet Pay – تسجيل الدخول</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #f5c842;
    --gold-light: #fde68a;
    --dark: #0a0a14;
    --dark2: #111122;
    --dark3: #1a1a2e;
    --purple: #6c3de8;
    --purple2: #8b5cf6;
    --glass: rgba(255,255,255,0.04);
    --border: rgba(245,200,66,0.18);
    --text: #e8e8f0;
    --muted: #7b7b9a;
  }

  html, body {
    height: 100%;
    font-family: 'Cairo', sans-serif;
    background: var(--dark);
    color: var(--text);
    overflow: hidden;
  }

  /* Animated background */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(108,61,232,0.35) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 90% 80%, rgba(245,200,66,0.12) 0%, transparent 60%),
                linear-gradient(135deg, #0a0a14 0%, #111122 50%, #0f0f1e 100%);
  }

  .bg-orbs {
    position: fixed; inset: 0; z-index: 0; overflow: hidden;
  }
  .orb {
    position: absolute; border-radius: 50%;
    filter: blur(80px); opacity: 0.15;
    animation: floatOrb 12s ease-in-out infinite;
  }
  .orb1 { width: 400px; height: 400px; background: var(--purple); top: -100px; left: -100px; animation-delay: 0s; }
  .orb2 { width: 300px; height: 300px; background: var(--gold); bottom: -80px; right: -80px; animation-delay: -4s; }
  .orb3 { width: 200px; height: 200px; background: #3b82f6; top: 40%; right: 10%; animation-delay: -8s; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(20px, -20px) scale(1.05); }
  }

  /* Grid lines */
  .grid-lines {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(108,61,232,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,61,232,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Main wrapper */
  .wrapper {
    position: relative; z-index: 1;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: rgba(16,16,30,0.85);
    backdrop-filter: blur(24px);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 44px;
    width: 100%;
    max-width: 460px;
    box-shadow:
      0 0 0 1px rgba(245,200,66,0.05),
      0 40px 80px rgba(0,0,0,0.6),
      0 0 60px rgba(108,61,232,0.12),
      inset 0 1px 0 rgba(255,255,255,0.05);
    animation: fadeIn 0.7s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Logo */
  .logo-area {
    text-align: center;
    margin-bottom: 36px;
  }

  .logo-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--purple) 0%, var(--gold) 100%);
    border-radius: 18px;
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
    box-shadow: 0 8px 32px rgba(108,61,232,0.45), 0 0 0 1px rgba(245,200,66,0.2);
    position: relative;
    overflow: hidden;
  }
  .logo-icon::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
  }
  .logo-icon svg { width: 32px; height: 32px; fill: #fff; position: relative; z-index: 1; }

  .logo-name {
    font-size: 26px; font-weight: 900;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, #fff 0%, var(--gold-light) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo-sub {
    font-size: 12px; color: var(--muted); margin-top: 3px;
    letter-spacing: 2px; text-transform: uppercase; font-weight: 400;
  }

  /* Form */
  h2 {
    font-size: 22px; font-weight: 700; color: #fff;
    margin-bottom: 6px;
  }
  .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

  .field {
    margin-bottom: 18px;
  }
  label {
    display: block;
    font-size: 13px; font-weight: 600;
    color: #c0bedd; margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
  }
  .input-wrap svg {
    position: absolute; top: 50%; transform: translateY(-50%);
    right: 14px; width: 18px; height: 18px;
    stroke: var(--muted); fill: none; stroke-width: 1.8;
    transition: stroke 0.2s;
  }

  input[type="email"], input[type="password"] {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    padding: 14px 42px 14px 16px;
    outline: none;
    transition: all 0.25s;
    direction: ltr; text-align: right;
  }
  input:focus {
    border-color: var(--purple2);
    background: rgba(139,92,246,0.06);
    box-shadow: 0 0 0 3px rgba(139,92,246,0.12);
  }
  input:focus + svg { stroke: var(--purple2); }

  .input-wrap:focus-within svg { stroke: var(--purple2); }

  .toggle-pass {
    position: absolute; top: 50%; transform: translateY(-50%);
    left: 14px; cursor: pointer;
    background: none; border: none; padding: 0;
    display: flex;
  }
  .toggle-pass svg {
    position: static; transform: none;
    width: 18px; height: 18px;
    stroke: var(--muted); fill: none; stroke-width: 1.8;
    transition: stroke 0.2s;
  }
  .toggle-pass:hover svg { stroke: var(--gold); }

  .forgot {
    display: flex; justify-content: flex-end; margin-top: 8px;
  }
  .forgot a {
    font-size: 12px; color: var(--muted);
    text-decoration: none; transition: color 0.2s;
  }
  .forgot a:hover { color: var(--gold); }

  .error-msg {
    display: none;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: 10px;
    color: #f87171;
    font-size: 13px;
    padding: 10px 14px;
    margin-bottom: 16px;
    text-align: center;
  }
  .error-msg.show { display: block; animation: shake 0.3s ease; }
  @keyframes shake {
    0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}
  }

  .btn-login {
    width: 100%;
    background: linear-gradient(135deg, var(--purple) 0%, var(--purple2) 100%);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-size: 15px; font-weight: 700;
    padding: 15px;
    cursor: pointer;
    margin-top: 8px;
    position: relative; overflow: hidden;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 8px 24px rgba(108,61,232,0.35);
  }
  .btn-login::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
  }
  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(108,61,232,0.5);
  }
  .btn-login:active { transform: translateY(0); }
  .btn-login.loading { pointer-events: none; opacity: 0.8; }

  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-left: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 24px 0;
    color: var(--muted); font-size: 12px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1;
    height: 1px; background: rgba(255,255,255,0.07);
  }

  .btn-register {
    width: 100%;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px; font-weight: 600;
    padding: 13px;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: block; text-align: center;
  }
  .btn-register:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(245,200,66,0.05);
  }

  /* Bottom badge */
  .secure-badge {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; margin-top: 24px;
    color: var(--muted); font-size: 11px;
  }
  .secure-badge svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
</style>
</head>
<body>

<div class="bg"></div>
<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<div class="grid-lines"></div>

<div class="wrapper">
  <div class="card">

    <div class="logo-area">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 14.93V18h-2v-1.07C9.06 16.54 7.5 14.93 7.5 13c0-.55.45-1 1-1s1 .45 1 1c0 1.1.9 2 2 2s2-.9 2-2c0-1.08-.73-1.56-2.5-2.08C8.56 10.22 7.5 9.12 7.5 7.5c0-1.93 1.56-3.54 3.5-3.93V2.5h2v1.07C14.94 3.96 16.5 5.57 16.5 7.5c0 .55-.45 1-1 1s-1-.45-1-1c0-1.1-.9-2-2-2s-2 .9-2 2c0 .79.47 1.26 2.5 1.92C15.44 10.28 16.5 11.38 16.5 13c0 1.93-1.56 3.54-3.5 3.93z"/></svg>
      </div>
      <div class="logo-name">Sweet Pay</div>
      <div class="logo-sub">منصة سحب أرباح Sweet Coins</div>
    </div>

    <h2>مرحباً بعودتك</h2>
    <p class="subtitle">سجّل الدخول للوصول إلى حسابك</p>

    <div class="error-msg" id="errorMsg">البريد الإلكتروني أو كلمة المرور غير صحيحة</div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">البريد الإلكتروني</label>
        <div class="input-wrap">
          <input type="email" id="email" placeholder="example@email.com" autocomplete="email" required>
          <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
      </div>

      <div class="field">
        <label for="password">كلمة المرور</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <button type="button" class="toggle-pass" id="togglePass" aria-label="إظهار كلمة المرور">
            <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="forgot"><a href="#">نسيت كلمة المرور؟</a></div>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <span id="btnText">تسجيل الدخول</span>
      </button>
    </form>

    <div class="divider">أو</div>

    <a href="register.html" class="btn-register">إنشاء حساب جديد</a>

    <div class="secure-badge">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      محمي بتشفير SSL 256-bit
    </div>

  </div>
</div>

<script>
const VALID_EMAIL = 'Missmdkr@gmail.com';
const VALID_PASS  = 'wissal 123';

const form      = document.getElementById('loginForm');
const emailIn   = document.getElementById('email');
const passIn    = document.getElementById('password');
const errorMsg  = document.getElementById('errorMsg');
const loginBtn  = document.getElementById('loginBtn');
const btnText   = document.getElementById('btnText');
const toggleBtn = document.getElementById('togglePass');

toggleBtn.addEventListener('click', () => {
  const isPass = passIn.type === 'password';
  passIn.type = isPass ? 'text' : 'password';
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorMsg.classList.remove('show');

  const email = emailIn.value.trim();
  const pass  = passIn.value;

  loginBtn.classList.add('loading');
  btnText.innerHTML = 'جارٍ التحقق... <span class="spinner"></span>';

  await new Promise(r => setTimeout(r, 1800));

  if (email.toLowerCase() === VALID_EMAIL.toLowerCase() && pass === VALID_PASS) {
    btnText.innerHTML = '✓ &nbsp;تم التحقق، جارٍ التحميل...';
    await new Promise(r => setTimeout(r, 600));
    window.open('dashboard.html', '_blank');
    loginBtn.classList.remove('loading');
    btnText.textContent = 'تسجيل الدخول';
  } else {
    loginBtn.classList.remove('loading');
    btnText.textContent = 'تسجيل الدخول';
    errorMsg.classList.add('show');
    emailIn.style.borderColor = 'rgba(239,68,68,0.5)';
    passIn.style.borderColor  = 'rgba(239,68,68,0.5)';
    setTimeout(() => {
      emailIn.style.borderColor = '';
      passIn.style.borderColor  = '';
    }, 2000);
  }
});

[emailIn, passIn].forEach(el => {
  el.addEventListener('input', () => errorMsg.classList.remove('show'));
});
</script>
</body>
</html>
