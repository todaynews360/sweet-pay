<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweet Pay – إنشاء حساب</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--gold:#f5c842;--gold-light:#fde68a;--dark:#0a0a14;--purple:#6c3de8;--purple2:#8b5cf6;--border:rgba(245,200,66,0.18);--text:#e8e8f0;--muted:#7b7b9a}
  html,body{min-height:100%;font-family:'Cairo',sans-serif;background:var(--dark);color:var(--text)}
  .bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(108,61,232,0.35) 0%,transparent 70%),linear-gradient(135deg,#0a0a14 0%,#111122 50%,#0f0f1e 100%)}
  .grid-lines{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(108,61,232,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(108,61,232,0.04) 1px,transparent 1px);background-size:60px 60px}
  .wrapper{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .card{background:rgba(16,16,30,0.88);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:24px;padding:44px 40px;width:100%;max-width:520px;box-shadow:0 40px 80px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.05);animation:fadeIn .7s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  .logo-area{text-align:center;margin-bottom:28px}
  .logo-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--purple),var(--gold));border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:10px;box-shadow:0 8px 32px rgba(108,61,232,0.45)}
  .logo-icon svg{width:28px;height:28px;fill:#fff}
  .logo-name{font-size:24px;font-weight:900;background:linear-gradient(90deg,#fff,var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .logo-sub{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
  h2{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px}
  .subtitle{font-size:13px;color:var(--muted);margin-bottom:24px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .field{margin-bottom:16px}
  label{display:block;font-size:13px;font-weight:600;color:#c0bedd;margin-bottom:7px}
  .input-wrap{position:relative}
  .input-wrap svg{position:absolute;top:50%;transform:translateY(-50%);right:13px;width:17px;height:17px;stroke:var(--muted);fill:none;stroke-width:1.8;pointer-events:none}
  .input-wrap:focus-within svg{stroke:var(--purple2)}
  input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:11px;color:#fff;font-family:'Cairo',sans-serif;font-size:14px;padding:13px 40px 13px 14px;outline:none;transition:all .25s;direction:ltr;text-align:right}
  input:focus{border-color:var(--purple2);background:rgba(139,92,246,0.06);box-shadow:0 0 0 3px rgba(139,92,246,0.12)}
  .terms{display:flex;align-items:flex-start;gap:10px;margin:16px 0}
  .terms input[type=checkbox]{width:16px;height:16px;min-width:16px;accent-color:var(--purple2);margin-top:3px;direction:ltr;padding:0}
  .terms p{font-size:12px;color:var(--muted);line-height:1.6}
  .terms a{color:var(--gold);text-decoration:none}
  .btn-reg{width:100%;background:linear-gradient(135deg,var(--purple),var(--purple2));border:none;border-radius:12px;color:#fff;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;padding:15px;cursor:pointer;box-shadow:0 8px 24px rgba(108,61,232,0.35);transition:transform .15s;position:relative;overflow:hidden}
  .btn-reg::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.12) 0%,transparent 60%)}
  .btn-reg:hover{transform:translateY(-2px)}
  .login-link{text-align:center;margin-top:20px;font-size:13px;color:var(--muted)}
  .login-link a{color:var(--gold);text-decoration:none;font-weight:600}
  .success-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(10,10,20,0.92);backdrop-filter:blur(8px);align-items:center;justify-content:center}
  .success-overlay.show{display:flex;animation:fadeIn .4s ease}
  .success-box{background:rgba(16,16,30,0.98);border:1px solid rgba(245,200,66,0.3);border-radius:24px;padding:44px 36px;text-align:center;max-width:360px;width:90%}
  .check-icon{width:72px;height:72px;background:linear-gradient(135deg,#059669,#34d399);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-bottom:18px;box-shadow:0 8px 32px rgba(5,150,105,0.4)}
  .check-icon svg{width:36px;height:36px;stroke:#fff;fill:none;stroke-width:3}
  .success-box h3{font-size:20px;font-weight:800;color:#fff;margin-bottom:10px}
  .success-box p{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:22px}
  .btn-goto{display:inline-block;background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;font-family:'Cairo',sans-serif;font-weight:700;font-size:14px;padding:13px 28px;border-radius:12px;text-decoration:none}

  @media(max-width:540px){
    .card{padding:28px 18px;border-radius:20px}
    .row{grid-template-columns:1fr}
    .logo-name{font-size:20px}
    h2{font-size:18px}
  }
</style>
</head>
<body>
<div class="bg"></div><div class="grid-lines"></div>
<div class="wrapper">
  <div class="card">
    <div class="logo-area">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 14.93V18h-2v-1.07C9.06 16.54 7.5 14.93 7.5 13c0-.55.45-1 1-1s1 .45 1 1c0 1.1.9 2 2 2s2-.9 2-2c0-1.08-.73-1.56-2.5-2.08C8.56 10.22 7.5 9.12 7.5 7.5c0-1.93 1.56-3.54 3.5-3.93V2.5h2v1.07C14.94 3.96 16.5 5.57 16.5 7.5c0 .55-.45 1-1 1s-1-.45-1-1c0-1.1-.9-2-2-2s-2 .9-2 2c0 .79.47 1.26 2.5 1.92C15.44 10.28 16.5 11.38 16.5 13c0 1.93-1.56 3.54-3.5 3.93z"/></svg></div>
      <div class="logo-name">Sweet Pay</div>
      <div class="logo-sub">منصة سحب أرباح Sweet Coins</div>
    </div>
    <h2>إنشاء حساب جديد</h2>
    <p class="subtitle">انضم اليوم وابدأ رحلتك مع Sweet Pay</p>
    <form id="regForm" novalidate>
      <div class="row">
        <div class="field">
          <label>الاسم</label>
          <div class="input-wrap"><input type="text" placeholder="الاسم الأول" required>
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        </div>
        <div class="field">
          <label>اللقب</label>
          <div class="input-wrap"><input type="text" placeholder="اللقب" required>
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        </div>
      </div>
      <div class="field">
        <label>البريد الإلكتروني</label>
        <div class="input-wrap"><input type="email" placeholder="example@email.com" required>
        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
      </div>
      <div class="field">
        <label>رقم الهاتف</label>
        <div class="input-wrap"><input type="tel" placeholder="+213 xxx xxx xxx" required>
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.44 2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.37a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div>
      </div>
      <div class="field">
        <label>اسم حساب Sweet Coins</label>
        <div class="input-wrap"><input type="text" placeholder="اسم المستخدم في Sweet Coins" required>
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
      </div>
      <div class="row">
        <div class="field">
          <label>كلمة المرور</label>
          <div class="input-wrap"><input type="password" placeholder="••••••••" required>
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
        </div>
        <div class="field">
          <label>تأكيد كلمة المرور</label>
          <div class="input-wrap"><input type="password" placeholder="••••••••" required>
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
        </div>
      </div>
      <div class="terms">
        <input type="checkbox" required>
        <p>أوافق على <a href="#">شروط الاستخدام</a> و<a href="#">سياسة الخصوصية</a> لمنصة Sweet Pay</p>
      </div>
      <button type="submit" class="btn-reg" id="regBtn">إنشاء الحساب</button>
    </form>
    <div class="login-link">لديك حساب بالفعل؟ <a href="index.html">تسجيل الدخول</a></div>
  </div>
</div>
<div class="success-overlay" id="successOverlay">
  <div class="success-box">
    <div class="check-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
    <h3>تم إنشاء حسابك بنجاح!</h3>
    <p>مرحباً بك في Sweet Pay. سيتم مراجعة حسابك وتفعيله خلال الأيام القادمة.</p>
    <a href="index.html" class="btn-goto">الذهاب لتسجيل الدخول</a>
  </div>
</div>
<script>
document.getElementById('regForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('regBtn');
  btn.textContent = 'جارٍ إنشاء الحساب...';
  btn.style.opacity = '0.7';
  await new Promise(r => setTimeout(r, 2000));
  document.getElementById('successOverlay').classList.add('show');
});
</script>
</body>
</html>
